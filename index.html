<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/webp" href="https://cdn.jsdelivr.net/gh/devoncasa/VickyLuxGems-Assets@main/vkluxgem%20logo%20smll.webp" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @font-face{font-family:'Cormorant Garamond';font-style:normal;font-weight:400;src:url(https://fonts.gstatic.com/s/cormorantgaramond/v16/co3bmX5slCNuHLi8bLeY9MK7whWMhyjQpHQYvvQ-aQ.woff2) format('woff2')}
      @font-face{font-family:'Tenor Sans';font-style:normal;font-weight:400;src:url(https://fonts.gstatic.com/s/tenorsans/v15/A_BFVx11K2ytg2Q237T1-A.woff2) format('woff2')}
      :root{--c-bg:#FFF8E7;--c-surface:#FFFDF7;--c-surface-alt:#F7EFE4;--c-footer-bg:#2f2922;--c-footer-text:#EAE3DA;--c-img-placeholder-bg:#EAE0D5;--c-heading:#3B2A1E;--c-text-primary:#3B2A1E;--c-text-secondary:#8d7651;--c-heading-on-dark:#FDFDFD;--c-text-on-dark:#FDFDFD;--c-border:rgba(93,64,55,.13);--c-border-muted:#B49B5E;--c-accent-primary:#904a21;--c-accent-primary-hover:#824D33;--c-accent-secondary:#B49B5E;--c-accent-secondary-hover:#A18A52;--c-builder-text:#5D4037}
      body{background:radial-gradient(circle at 8% 5%,rgba(180,155,94,.18),transparent 28rem),var(--c-bg);color:var(--c-text-primary);font-family:'Tenor Sans',sans-serif}h1,h2,h3,h4,h5,h6{font-family:'Cormorant Garamond',serif;color:var(--c-heading);font-weight:700}.brand-headline{font-family:'Cormorant Garamond',serif;background:linear-gradient(45deg,#8b5e22,#d4af37,#7e3e20);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}.btn-primary{background-color:var(--c-accent-primary);transition:.3s}.btn-primary:hover{background-color:var(--c-accent-primary-hover)}.main-nav-link{color:var(--c-text-primary);position:relative}.main-nav-link:after{content:'';position:absolute;width:0;height:2px;bottom:-4px;left:50%;transform:translateX(-50%);background:var(--c-accent-primary-hover);transition:.3s}.main-nav-link.active:after,.main-nav-link:hover:after{width:100%}header.main-header{background:rgba(255,248,231,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--c-border);box-shadow:0 10px 35px rgba(61,53,46,.05)}header.main-header.scrolled{background:rgba(255,248,231,.94);box-shadow:0 16px 42px rgba(61,53,46,.10)}.hero-content-block{background:rgba(255,253,247,.58);backdrop-filter:blur(18px);border:1px solid rgba(180,155,94,.42);box-shadow:0 24px 80px rgba(144,74,33,.18)}.page-container-with-bg{background-color:transparent}.bg-\[var\(--c-surface\)\]{border:1px solid rgba(180,155,94,.28);box-shadow:0 8px 32px rgba(80,50,20,.07)}.mobile-nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}.mobile-nav-panel{position:fixed;top:0;bottom:0;right:0;width:80%;max-width:320px;background:var(--c-bg);z-index:50;transform:translateX(100%);transition:.3s;display:flex;flex-direction:column}.mobile-nav-panel.open{transform:translateX(0)}
    </style>
  </head>
  <body>
    <div id="root"></div>

  </body>
